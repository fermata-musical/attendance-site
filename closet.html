<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>備品管理サイト</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.png" sizes="32x32">
    <link rel="icon" href="icon.png" sizes="192x192">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <!-- キャッシュ対策のためバージョンを更新 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/closet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ローディング画面 -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loader-box">
            <div class="spinner"></div>
            <p>読み込み中...</p>
        </div>
    </div>

    <!-- 同期中ミニ表示 -->
    <div id="sync-indicator" class="sync-indicator hidden">
        <i class="fa-solid fa-cloud-arrow-up"></i> 保存中...
    </div>

    <div id="login-overlay" class="login-container">
        <div class="login-box card">
            <div class="main-title" style="align-items: center; margin-bottom: 25px;">
                <span class="main-txt" style="font-size: 1.5rem;">備品管理サイト</span>
                <span class="sub-txt">音楽集団フェルマータ</span>
            </div>
            <div class="input-group-full">
                <input type="password" id="password-input" class="cute-input" placeholder="パスワードを入力">
                <button id="login-btn" class="puffy-btn pink">ログイン <i class="fa-solid fa-right-to-bracket"></i></button>
            </div>
            <p id="login-error" class="hidden" style="color: var(--danger); font-size: 0.8rem; text-align: center; margin-top: 10px;">パスワードが違います</p>
        </div>
    </div>
        <div id="app" class="hidden">
        <header>
            <div class="header-content">
                <div class="main-title">
                    <span class="main-txt">備品管理サイト</span>
                    <span class="sub-txt">音楽集団フェルマータ</span>
                </div>

                <div style="display:flex; align-items:center; gap:10px;">

                    <button
                        id="current-user-btn"
                        class="icon-btn-sm"
                        title="使用者を変更">
                        <i class="fa-solid fa-user"></i>
                    </button>

                    <span
                        id="current-user-name"
                        style="font-size:0.85rem;font-weight:700;color:var(--text-main);">
                        未選択
                    </span>

                    <button id="logout-btn" class="icon-btn-sm">
                        <i class="fa-solid fa-door-open"></i>
                    </button>

                </div>
            </div>
            <nav>
                <button class="nav-tab active" data-tab="closet-list">
                    <i class="fa-solid fa-shirt"></i><br>一覧
                </button>

                <button class="nav-tab" data-tab="closet-entry">
                    <i class="fa-solid fa-square-plus"></i><br>登録
                </button>

                <button class="nav-tab" data-tab="closet-admin">
                    <i class="fa-solid fa-gear"></i><br>管理
                </button>
            </nav>
        </header>

        <main>

            <div id="closet-list" class="tab-content active">
                <div class="card">
                    <div class="section-header">
                        <h2><i class="fa-solid fa-shirt"></i> 衣装一覧</h2>
                    </div>

                    <div class="input-group-full" style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                        <input type="text" id="closet-search-name" class="cute-input" placeholder="名称検索" style="flex: 1; min-width: 150px;">
                        <input type="text" id="closet-search-number" class="cute-input" placeholder="管理番号検索" style="flex: 1; min-width: 120px;">
                        <select id="closet-search-category" class="cute-input" style="flex: 1; min-width: 120px;">
                            <option value="">全てのカテゴリー</option>
                        </select>
                        <button id="closet-search-btn" class="puffy-btn pink" onclick="renderClosetItems()"><i class="fa-solid fa-magnifying-glass"></i> 検索</button>
                    </div>

                    <div id="closet-items-container" style="display:grid; gap:1px; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); background:#e5e5e5;">
                        <!-- アイテムカードがここに動的に表示されます -->
                    </div>
                </div>
            </div>

            <div id="closet-entry" class="tab-content">
                <div class="card">
                    <div class="section-header">
                        <h2><i class="fa-solid fa-square-plus"></i> 衣装登録</h2>
                    </div>

                    <div id="item-info-panel"
                        style="display:none; margin-bottom:15px; padding:12px; background:#f8f8f8; border-radius:8px; font-size:0.9rem;">

                        <div style="text-align:center;">
                            <div style="font-size:0.9rem; color:#888;">管理番号</div>
                            <div id="info-management-number"
                                style="font-size:2rem; font-weight:700; color:#555; margin-top:4px; letter-spacing:2px;">
                                -
                            </div>
                        </div>

                    </div>

                    <form id="closet-entry-form" onsubmit="event.preventDefault(); submitClosetEntry();">
                        
                        <div class="input-group-full">
                        <div class="button-area" style="margin-bottom:20px;">

                            <button
                                type="button"
                                class="puffy-btn pink"
                                style="flex:1;"
                                onclick="document.querySelector('#closet-entry-form button[type=&quot;submit&quot;]').click();">
                                <i class="fa-solid fa-cloud-arrow-up"></i> 登録する
                            </button>

                            <button
                                type="button"
                                class="puffy-btn gray"
                                style="flex:1;"
                                onclick="document.getElementById('cancel-edit-btn').click();">
                                キャンセル
                            </button>

                        </div>

                            <div class="card" style="margin-top:20px;">

                                <div class="section-header">
                                    <h3><i class="fa-solid fa-box"></i> 基本情報</h3>
                                </div>

                                <!-- 写真登録 (Step 5で実装) -->
                                <div style="margin-top: 15px;">
                                    <label>写真</label>
                                    <input
                                        type="file"
                                        id="entry-image"
                                        class="cute-input"
                                        accept="image/*"
                                        multiple
                                        onchange="handleImageSelect(event)">
                                </div>

                                <div id="entry-image-preview"
                                    style="
                                        display:flex;
                                        flex-wrap:wrap;
                                        gap:10px;
                                        margin-top:10px;
                                    ">
                                </div>

                                <div style="display: flex; gap: 10px;">
                                    <div style="flex: 1;">
                                        <label>大項目 <span style="color:red">*</span></label>
                                        <select id="entry-large-category" class="cute-input" required>
                                            <option value="">選択</option>
                                        </select>
                                    </div>

                                    <div style="flex: 1;" id="middle-category-wrapper">
                                        <label>中項目</label>
                                        <select id="entry-middle-category" class="cute-input">
                                            <option value="">選択</option>
                                        </select>
                                    </div>

                                    <div style="flex: 1;">
                                        <label>小項目</label>
                                        <select id="entry-small-category" class="cute-input">
                                            <option value="">選択</option>
                                        </select>
                                    </div>
                                </div>

                                <div style="margin-top: 15px; border-top: 1px dashed var(--border-dusty); padding-top: 15px;">
                                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                                        <input type="checkbox" id="entry-is-set" onchange="toggleSetItemFields()">
                                        <strong>セット品として登録する</strong>
                                    </label>

                                    <div id="set-item-fields" style="display: none; margin-top: 10px; padding: 10px; background: var(--bg-soft); border-radius: 8px;">
                                        <div style="display: flex; gap: 10px;">
                                            <div style="flex: 1;">
                                                <label>数量</label>
                                                <input type="number" id="entry-set-quantity" class="cute-input" placeholder="例：1" value="1">
                                            </div>
                                        </div>
                                    </div>

                                    <hr style="margin:20px 0; border:none; border-top:1px dashed var(--border-dusty);">

                                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                                        <input type="checkbox" id="entry-next-usable">
                                        <strong>次回の公演で使えそう</strong>
                                    </label>

                                    <label style="margin-top:12px;">使えるとしたら</label>
                                    <textarea
                                        id="entry-next-comment"
                                        class="cute-input"
                                        rows="3"
                                        placeholder="キャラクター名・用途などを入力"></textarea>

                                    </div>

                                    </div>

                                    <div class="card" style="margin-top:20px;">

                                        <div class="section-header">
                                            <h3><i class="fa-solid fa-shirt"></i> アイテム情報</h3>
                                        </div>

                                        <div class="form-group">
                                            <label>名称 <span class="required">*</span></label>
                                            <input type="text" id="entry-name" class="cute-input" placeholder="例：黒いハット">
                                        </div>

                                        <div style="display: flex; gap: 10px;">
                                            <div style="flex: 1;">
                                                <label>保管ボックス</label>
                                                <select id="entry-storage" class="cute-input">
                                                    <option value="">選択</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div style="display: flex; gap: 10px;">
                                            <div style="flex: 1;">
                                                <label>サイズ</label>
                                                <input type="text" id="entry-size" class="cute-input" placeholder="例：M">
                                            </div>
                                        </div>

                            <label>使用履歴・キャラクター</label>
                            <textarea
                                id="entry-usage-history"
                                class="cute-input"
                                rows="3"
                                placeholder="例：美女と野獣 ベル、アナと雪の女王 アナ"></textarea>

                            </div>

                            <div class="card" style="margin-top:20px;">

                                <div class="section-header">
                                    <h3><i class="fa-solid fa-palette"></i> 属性</h3>
                                </div>

                                <div class="form-section">
                                    <label>雰囲気</label>
                                    <div id="entry-mood-container" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:5px;"></div>
                                </div>

                                <hr>

                                <div class="form-section">
                                    <label>色</label>
                                    <div id="entry-color-container" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:5px;"></div>
                                </div>

                            <hr>

                            <div class="form-section">
                                <label>入手方法</label>
                                <div id="entry-acquisition-container" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:5px;"></div>
                            </div>

                            <hr>

                            <div class="form-section">
                                <div style="display:flex; gap:10px;">
                                    <div style="flex:1;">
                                        <label>入手日</label>
                                        <input type="date" id="entry-purchase-date" class="cute-input">
                                    </div>

                                    <div style="flex:1;">
                                        <label>価格</label>
                                        <input type="number" id="entry-purchase-price" class="cute-input" placeholder="例：1500">
                                    </div>
                                </div>
                            </div>

                            </div>

                            <div class="card" style="margin-top:20px;">

                                <div class="section-header">
                                    <h3><i class="fa-solid fa-clipboard-check"></i> 管理情報</h3>
                                </div>

                                <div style="display: flex; gap: 10px;">
                                    <div style="flex: 1;">
                                        <label>管理状態</label>
                                        <select id="entry-status"
                                            class="cute-input"
                                            onchange="toggleLoanFields()">
                                            <option value="">選択</option>
                                        </select>
                                    </div>
                                </div>

                            <div id="loan-fields" style="display: none;">

                                <div style="display: flex; gap: 10px;">
                                    <div style="flex: 1;">
                                        <label>貸出先</label>
                                        <input type="text" id="entry-loan-to" class="cute-input">
                                    </div>

                                    <div style="flex: 1;">
                                        <label>貸出日</label>
                                        <input type="date" id="entry-loan-date" class="cute-input">
                                    </div>

                                    <div style="flex: 1;">
                                        <label>返却予定日</label>
                                        <input type="date" id="entry-return-date" class="cute-input">
                                    </div>
                                </div>

                            </div>

                            <div style="display: flex; gap: 10px;">
                                <div id="disposed-field" style="flex: 1; display:none;">
                                    <label>破棄日</label>
                                    <input type="date" id="entry-disposed-date" class="cute-input">
                                </div>

                                <div id="lost-field" style="flex: 1; display:none;">
                                    <label>紛失日</label>
                                    <input type="date" id="entry-lost-date" class="cute-input">
                                </div>

                                <div style="flex: 1;">
                                    <label>最終使用日</label>
                                    <input type="date" id="entry-last-used-date" class="cute-input">
                                </div>
                                </div>

                                </div>

                                <div class="card" style="margin-top:20px;">

                                    <div class="section-header">
                                        <h3><i class="fa-solid fa-note-sticky"></i> 備考</h3>
                                    </div>

                                    <label>備考</label>
                                    <textarea id="entry-remarks" class="cute-input" rows="3" placeholder="特記事項があれば入力"></textarea>

                                </div>

                                <div class="button-area">

                                    <button
                                        type="submit"
                                        class="puffy-btn pink"
                                        style="flex:1;">
                                        <i class="fa-solid fa-cloud-arrow-up"></i> 登録する
                                    </button>

                                    <button
                                        type="button"
                                        id="cancel-edit-btn"
                                        class="puffy-btn gray"
                                        style="flex:1;">
                                        キャンセル
                                    </button>

                                </div>
                        </div>
                    </form>
                </div>
            </div>

            <div id="closet-admin" class="tab-content">
                <div class="card">
                    <div class="section-header">
                        <h2><i class="fa-solid fa-gear"></i> 管理</h2>
                    </div>

                    <!-- サブタブ -->
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <button
                            class="puffy-btn pink admin-subtab active"
                            data-admin-tab="storage">
                            保管場所
                        </button>
                    </div>

                    <!-- 保管場所サブタブ -->
                    <div id="admin-storage" class="admin-tab-content">

                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <h3>保管場所一覧</h3>

                            <button
                                class="puffy-btn pink"
                                id="btn-add-storage"
                                onclick="document.getElementById('storage-entry-form').style.display='block'; this.style.display='none';">
                                <i class="fa-solid fa-plus"></i> 新規登録
                            </button>
                        </div>

                        <!-- 登録フォーム -->
                        <div
                                    id="storage-entry-form"
                            class="card"
                            style="display:none; margin-bottom:15px;">

                            <div style="display:flex; gap:10px;">

                                <div style="flex:1;">
                                    <label>箱</label>
                                    <input
                                        type="text"
                                        id="storage-code"
                                        class="cute-input"
                                        placeholder="例：C9">
                                </div>

                                <div style="flex:2;">
                                    <label>保管場所</label>
                                    <input
                                        type="text"
                                        id="storage-location"
                                        class="cute-input"
                                        placeholder="例：段原公民館">
                                </div>

                            </div>

                            <div style="margin-top:15px; display:flex; gap:10px; justify-content:flex-end;">

                                <button
                                    type="button"
                                    class="puffy-btn gray"
                                    onclick="
                                            document.getElementById('storage-entry-form').style.display='none';
                                            document.getElementById('btn-add-storage').style.display='inline-flex';
                                        ">
                                        キャンセル
                                    </button>

                                    <button
                                        type="button"
                                        class="puffy-btn pink"
                                        id="btn-save-storage"
                                        onclick="saveStorageBox()">
                                        登録
                                    </button>

                                </div>

                            </div>

                            <div id="storage-box-list">
                                <!-- JavaScriptでカードを生成 -->
                            </div>

                    </div>
                </div>
            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cloud.js"></script>

    <script src="js/profile.js"></script>
    <script src="js/cast.js"></script>
    <script src="js/memo.js"></script>
    <script src="js/links.js"></script>
    <script src="js/memo-comments.js"></script>
    <script src="js/past.js"></script>
    <script src="js/practice.js"></script>
    <script src="js/image-manager.js"></script>
    <script src="js/closet.js"></script>

    <script src="js/main.js"></script>

</body>
</html>
