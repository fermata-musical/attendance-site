<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>衣装管理サイト</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.png" sizes="32x32">
    <link rel="icon" href="icon.png" sizes="192x192">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <!-- キャッシュ対策のためバージョンを更新 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/closet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ローディング画面 -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loader-box">
            <div class="spinner"></div>
            <p>読み込み中...</p>
        </div>
    </div>

    <!-- 同期中ミニ表示 -->
    <div id="sync-indicator" class="sync-indicator hidden">
        <i class="fa-solid fa-cloud-arrow-up"></i> 保存中...
    </div>

    <div id="login-overlay" class="login-container">
        <div class="login-box card">
            <div class="main-title" style="align-items: center; margin-bottom: 25px;">
                <span class="main-txt" style="font-size: 1.5rem;">衣装管理サイト</span>
                <span class="sub-txt">音楽集団フェルマータ</span>
            </div>
            <div class="input-group-full">
                <input type="password" id="password-input" class="cute-input" placeholder="パスワードを入力">
                <button id="login-btn" class="puffy-btn pink">ログイン <i class="fa-solid fa-right-to-bracket"></i></button>
            </div>
            <p id="login-error" class="hidden" style="color: var(--danger); font-size: 0.8rem; text-align: center; margin-top: 10px;">パスワードが違います</p>
        </div>
    </div>
        <div id="app" class="hidden">
        <header>
            <div class="header-content">
                <div class="main-title">
                    <span class="main-txt">衣装管理サイト</span>
                    <span class="sub-txt">音楽集団フェルマータ</span>
                </div>
                <button id="logout-btn" class="icon-btn-sm"><i class="fa-solid fa-door-open"></i></button>
            </div>
            <nav>
                <button class="nav-tab active" data-tab="closet-list">
                    <i class="fa-solid fa-shirt"></i><br>一覧
                </button>

                <button class="nav-tab" data-tab="closet-entry">
                    <i class="fa-solid fa-square-plus"></i><br>登録
                </button>

                <button class="nav-tab" data-tab="closet-admin">
                    <i class="fa-solid fa-gear"></i><br>管理
                </button>
            </nav>
        </header>

        <main>

            <div id="closet-list" class="tab-content active">
                <div class="card">
                    <div class="section-header">
                        <h2><i class="fa-solid fa-shirt"></i> 衣装一覧</h2>
                    </div>

                    <div class="input-group-full" style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                        <input type="text" id="closet-search-name" class="cute-input" placeholder="名称検索" style="flex: 1; min-width: 150px;">
                        <input type="text" id="closet-search-number" class="cute-input" placeholder="管理番号検索" style="flex: 1; min-width: 120px;">
                        <select id="closet-search-category" class="cute-input" style="flex: 1; min-width: 120px;">
                            <option value="">全てのカテゴリー</option>
                        </select>
                        <button id="closet-search-btn" class="puffy-btn pink" onclick="renderClosetItems()"><i class="fa-solid fa-magnifying-glass"></i> 検索</button>
                    </div>

                    <div id="closet-items-container" style="display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
                        <!-- アイテムカードがここに動的に表示されます -->
                    </div>
                </div>
            </div>

            <div id="closet-entry" class="tab-content">
                <div class="card">
                    <div class="section-header">
                        <h2><i class="fa-solid fa-square-plus"></i> 衣装登録</h2>
                    </div>

                    <form id="closet-entry-form" onsubmit="event.preventDefault(); submitClosetEntry();">
                        <div class="input-group-full">
                            <label>名称</label>
                            <input type="text" id="entry-name" class="cute-input" placeholder="例：黒いハット">

                            <div style="display: flex; gap: 10px;">
                                <div style="flex: 1;">
                                    <label>大項目 <span style="color:red">*</span></label>
                                    <select id="entry-large-category" class="cute-input" required><option value="">選択</option></select>
                                </div>
                                <div style="flex: 1;" id="middle-category-wrapper">
                                    <label>中項目</label>
                                    <select id="entry-middle-category" class="cute-input"><option value="">選択</option></select>
                                </div>
                                <div style="flex: 1;">
                                    <label>小項目</label>
                                    <select id="entry-small-category" class="cute-input"><option value="">選択</option></select>
                                </div>
                            </div>

                            <div style="display: flex; gap: 10px;">
                                <div style="flex: 1;">
                                    <label>サイズ</label>
                                    <input type="text" id="entry-size" class="cute-input" placeholder="例：M">
                                </div>
                                <div style="flex: 1;">
                                    <label>色</label>
                                    <div id="entry-color-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px;"></div>
                                </div>
                            </div>

                            <div style="display: flex; gap: 10px;">
                                <div style="flex: 1;">
                                    <label>購入日</label>
                                    <input type="date" id="entry-purchase-date" class="cute-input">
                                </div>
                                <div style="flex: 1;">
                                    <label>購入価格</label>
                                    <input type="number" id="entry-purchase-price" class="cute-input" placeholder="例：1500">
                                </div>
                            </div>

                            <div style="display: flex; gap: 10px;">
                                <div style="flex: 1;">
                                    <label>入手方法</label>
                                    <div id="entry-acquisition-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px;"></div>
                                </div>
                                <div style="flex: 1;">
                                    <label>雰囲気</label>
                                    <div id="entry-mood-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px;"></div>
                                </div>
                                <div style="flex: 1;">
                                    <label>保管場所</label>
                                    <select id="entry-storage" class="cute-input"><option value="">選択</option></select>
                                </div>
                            </div>

                            <label>備考</label>
                            <textarea id="entry-remarks" class="cute-input" rows="3" placeholder="特記事項があれば入力"></textarea>

                            <div style="margin-top: 15px; border-top: 1px dashed var(--border-dusty); padding-top: 15px;">
                                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                                    <input type="checkbox" id="entry-is-set" onchange="toggleSetItemFields()">
                                    <strong>セット品として登録する</strong>
                                </label>
                                
                                <div id="set-item-fields" style="display: none; margin-top: 10px; padding: 10px; background: var(--bg-soft); border-radius: 8px;">
                                    <div style="display: flex; gap: 10px;">
                                        <div style="flex: 1;">
                                            <label>親番号</label>
                                            <input type="text" id="entry-parent-number" class="cute-input" placeholder="例：0013">
                                        </div>
                                        <div style="flex: 1;">
                                            <label>子番号</label>
                                            <input type="number" id="entry-child-number" class="cute-input" placeholder="例：1">
                                        </div>
                                        <div style="flex: 1;">
                                            <label>数量</label>
                                            <input type="number" id="entry-set-quantity" class="cute-input" placeholder="例：1" value="1">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 写真登録 (Step 5で実装) -->
                            <div style="margin-top: 15px;">
                                <label>写真</label>
                                <input type="file" id="entry-image" class="cute-input" accept="image/*">
                            </div>

                            <button type="submit" class="puffy-btn pink" style="margin-top: 20px; width: 100%;">
                                <i class="fa-solid fa-cloud-arrow-up"></i> 登録する
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="closet-admin" class="tab-content">
                <div class="card">
                    <div class="section-header">
                        <h2><i class="fa-solid fa-gear"></i> 管理</h2>
                    </div>

                    <p>管理画面をここに作成します。</p>
                </div>
            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cloud.js"></script>

    <script src="js/profile.js"></script>
    <script src="js/cast.js"></script>
    <script src="js/memo.js"></script>
    <script src="js/links.js"></script>
    <script src="js/memo-comments.js"></script>
    <script src="js/past.js"></script>
    <script src="js/practice.js"></script>
    <script src="js/closet.js"></script>

    <script src="app.js?v=1.6"></script>
    <script src="js/main.js"></script>

</body>
</html>
