<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音楽集団フェルマータ 出欠管理サイト</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <header>
            <div class="header-content">
                <div class="main-title">
                    <span class="sub-txt">音楽集団フェルマータ</span>
                    <span class="main-txt">出欠管理サイト</span>
                </div>
                <button id="logout-btn" class="puffy-btn-sm lavender">ログアウト</button>
            </div>
            <nav id="main-nav">
                <button class="nav-tab active" data-tab="attendance-input">
                    <i class="fa-solid fa-heart"></i><br>出欠入力
                    <span class="lock-icon hidden"><i class="fa-solid fa-lock"></i></span>
                </button>
                <button class="nav-tab" data-tab="overall-status">
                    <i class="fa-solid fa-star"></i><br>参加状況
                    <span class="lock-icon hidden"><i class="fa-solid fa-lock"></i></span>
                </button>
                <button class="nav-tab" data-tab="admin-panel">
                    <i class="fa-solid fa-wand-magic-sparkles"></i><br>管理
                    <span class="lock-icon hidden"><i class="fa-solid fa-lock"></i></span>
                </button>
                <button class="nav-tab" data-tab="past-records">
                    <i class="fa-solid fa-history"></i><br>過去
                    <span class="lock-icon hidden"><i class="fa-solid fa-lock"></i></span>
                </button>
            </nav>
        </header>

        <main>
            <!-- 1. 出欠入力 -->
            <section id="attendance-input" class="tab-content active">
                <div class="card member-selection-card">
                    <div class="member-select-row">
                        <div class="select-wrapper">
                            <i class="fa-solid fa-user-circle"></i>
                            <select id="member-select" class="cute-input">
                                <option value="">メンバーを選択</option>
                            </select>
                        </div>
                        <div id="member-action-btns" class="hidden">
                            <button class="icon-btn-sm" id="edit-current-member-btn" title="名前を編集"><i class="fa-solid fa-pen"></i></button>
                            <button class="icon-btn-sm" id="delete-current-member-btn" title="削除"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                        <button id="show-add-member-btn" class="icon-btn-sm pink" title="新規追加"><i class="fa-solid fa-user-plus"></i></button>
                    </div>

                    <div id="add-member-form" class="hidden add-form-pop">
                        <input type="text" id="new-member-name" placeholder="氏名を入力" class="cute-input">
                        <div class="form-btns">
                            <button id="confirm-member-btn" class="puffy-btn pink puffy-btn-sm">登録</button>
                            <button id="cancel-member-btn" class="puffy-btn gray puffy-btn-sm">中止</button>
                        </div>
                    </div>
                </div>

                <div class="month-tab-container">
                    <div id="month-tab-bar" class="sub-tab-bar"></div>
                </div>
                <div id="attendance-list-container"></div>
            </section>

            <!-- 2. 全体の参加状況 -->
            <section id="overall-status" class="tab-content">
                <div class="month-tab-container">
                    <div id="status-month-tab-bar" class="sub-tab-bar"></div>
                </div>
                <div id="overall-status-container"></div>
            </section>

            <!-- 3. 管理画面 -->
            <section id="admin-panel" class="tab-content">
                <div class="admin-menu-tabs">
                    <button class="menu-tab active" data-menu="rehearsal-edit">日程編集</button>
                    <button class="menu-tab" data-menu="dropdown-edit">項目管理</button>
                    <button class="menu-tab" data-menu="tab-visibility">閲覧制限</button>
                </div>

                <div id="rehearsal-edit" class="sub-tab-content active">
                    <datalist id="list-locations"></datalist>
                    <datalist id="list-menus"></datalist>

                    <div id="admin-rehearsal-list"></div>
                    <button id="add-rehearsal-btn" class="puffy-btn pink big-main-btn">
                        <i class="fa-solid fa-calendar-plus"></i> 新しい稽古日を追加
                    </button>
                </div>

                <div id="dropdown-edit" class="sub-tab-content">
                    <div class="card">
                        <h3>場所リスト</h3>
                        <div class="input-group-full">
                            <input type="text" id="new-location-input" placeholder="場所を追加" class="cute-input">
                            <button id="add-location-btn" class="puffy-btn pink">追加</button>
                        </div>
                        <ul id="admin-location-list" class="sortable-list"></ul>
                    </div>
                    <div class="card">
                        <h3>メニューリスト</h3>
                        <div class="input-group-full">
                            <input type="text" id="new-menu-input" placeholder="メニューを追加" class="cute-input">
                            <button id="add-menu-btn" class="puffy-btn pink">追加</button>
                        </div>
                        <ul id="admin-menu-list" class="sortable-list"></ul>
                    </div>
                </div>

                <div id="tab-visibility" class="sub-tab-content">
                    <div class="card">
                        <h3>タブ閲覧制限設定</h3>
                        <div id="visibility-controls-container"></div>
                    </div>
                </div>
            </section>

            <!-- 4. 過去の出欠管理 -->
            <section id="past-records" class="tab-content">
                <div class="month-tab-container">
                    <div id="past-month-tab-bar" class="sub-tab-bar"></div>
                </div>
                <div class="past-header card" style="display:flex; justify-content:space-between; align-items:center;">
                    <!-- ★ 選択削除ボタンを追加 -->
                    <button id="delete-selected-past-btn" class="puffy-btn gray puffy-btn-sm" style="font-size:0.75rem;">選択したデータを削除</button>
                    <button id="clear-past-btn" class="puffy-btn danger puffy-btn-sm" style="font-size:0.75rem;">全削除</button>
                </div>
                <div id="past-records-container"></div>
            </section>
        </main>
    </div>

    <!-- ログイン -->
    <div id="login-overlay" class="overlay">
        <div class="login-card card">
            <div class="main-title dark">
                <span class="sub-txt">音楽集団フェルマータ</span>
                <span class="main-txt">出欠管理サイト</span>
            </div>
            <div class="login-form">
                <input type="password" id="password-input" placeholder="Password" class="cute-input">
                <button id="login-btn" class="puffy-btn pink">Login</button>
                <p id="login-error" class="error-text hidden">パスワードがちがいます</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
